{% extends "base.html" %}

{% block content %}
<div class="flex min-h-[calc(100vh-140px)]">
    <!-- Sidebar: fixed, extends to bottom with Logout above footer -->
    <aside class="hidden lg:flex lg:flex-col lg:w-64 lg:fixed lg:top-0 lg:bottom-0 lg:left-0 lg:z-[60] bg-white border-r border-slate-200 shadow-sm">
        <a href="{{ url_for('admin_dashboard') }}" class="flex items-center gap-2 px-4 py-5 border-b border-slate-200 hover:opacity-90 transition-opacity flex-shrink-0">
            <div class="h-8 w-8 rounded-lg bg-black flex items-center justify-center flex-shrink-0">
                <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
                    <rect x="2" y="7" width="4" height="10" rx="1" fill="currentColor"/>
                    <rect x="18" y="7" width="4" height="10" rx="1" fill="currentColor"/>
                    <rect x="6" y="11" width="12" height="2" fill="currentColor"/>
                </svg>
            </div>
            <span class="font-bold text-slate-900 whitespace-nowrap">Admin</span>
        </a>
        <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">
            <a href="{{ url_for('admin_dashboard') }}"
               class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold transition-colors {% if request.endpoint == 'admin_dashboard' %}bg-purple-50 text-purple-700{% else %}text-slate-600 hover:bg-slate-100 hover:text-slate-900{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
                </svg>
                Dashboard
            </a>
            <a href="{{ url_for('admin_members') }}"
               class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold transition-colors {% if request.endpoint in ['admin_members', 'admin_member_detail'] %}bg-purple-50 text-purple-700{% else %}text-slate-600 hover:bg-slate-100 hover:text-slate-900{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
                </svg>
                Members
            </a>
            <a href="{{ url_for('admin_gyms') }}"
               class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold transition-colors {% if request.endpoint == 'admin_gyms' %}bg-purple-50 text-purple-700{% else %}text-slate-600 hover:bg-slate-100 hover:text-slate-900{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                </svg>
                Gyms & Pricing
            </a>
            <a href="{{ url_for('admin_database') }}"
               class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold transition-colors {% if request.endpoint == 'admin_database' %}bg-purple-50 text-purple-700{% else %}text-slate-600 hover:bg-slate-100 hover:text-slate-900{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"/>
                </svg>
                Database
            </a>
        </nav>
        <!-- Logout at bottom of sidebar, above footer -->
        <div class="mt-auto p-4 border-t border-slate-200">
            <a href="{{ url_for('admin_logout') }}"
               class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold transition-colors text-amber-800 hover:bg-amber-50">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                </svg>
                Logout
            </a>
        </div>
    </aside>

    <!-- Main content -->
    <main class="lg:pl-64 flex-1 min-w-0 w-full">
        <div class="py-6 px-4 sm:px-6 lg:px-8 w-full">
            {% block admin_content %}{% endblock %}
        </div>
    </main>
</div>
{% endblock %}
